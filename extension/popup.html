<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0f172a; /* Darker theme matching the icon */
      color: #f1f5f9;
      margin: 0;
    }
    .header { 
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px; 
      font-weight: 800; 
      color: #38bdf8; 
      margin-bottom: 24px; 
      letter-spacing: -0.5px;
    }
    .header img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }
    .loading { display: none; text-align: center; padding: 20px 0; }
    .loading-spinner {
      border: 3px solid #334155; border-top: 3px solid #38bdf8;
      border-radius: 50%; width: 28px; height: 28px; animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    #preview-area { 
      margin-top: 10px;
      padding: 12px;
      background: #1e293b;
      border-radius: 8px;
      border: 1px solid #334155;
      font-size: 14px;
      line-height: 1.5;
      color: #cbd5e1;
    }

    .btn {
      width: 100%; 
      background: #0284c7; 
      color: white; 
      border: none; 
      padding: 12px;
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 700; 
      font-size: 15px; 
      transition: all 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .btn:hover { background: #0ea5e9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { background: #475569; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon64.png" alt="Logo">
    Centaur Notes
  </div>

  <div id="main-area">
    <button id="btn-preview" class="btn">Capture to Notion</button>
    
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <div id="status-text" style="font-size: 13px; color: #94a3b8; font-weight: 500;">Analyzing content...</div>
    </div>

    <div id="preview-area">
      <!-- Status messages will be injected here by popup.js -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
